name: offline-tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-retrieval.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy \
            scikit-learn \
            requests \
            PyYAML \
            markdownify \
            torch --extra-index-url https://download.pytorch.org/whl/cpu

      # sentence-transformers pulls a model on first import; install separately
      # so the rest of the test suite can run without it if download fails.
      - name: Install sentence-transformers (best-effort)
        run: pip install sentence-transformers || true

      - name: Syntax check — src
        run: python -m compileall -q src/ scripts/ tests/ || true

      - name: Run offline test suite
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v 2>&1

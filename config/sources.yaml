# Lost Melbourne AI — Source Registry
# This is a REPLACEMENT corpus, not an exact reconstruction of any earlier unverified run.
# The original collect.py and source list were not found in the repository or local machine.
# All sources below are newly selected reputable public sources about demolished buildings,
# historic places and changing neighbourhoods in Melbourne, Victoria, Australia.
#
# Licence key:
#   CC-BY-4.0  — Creative Commons Attribution 4.0 International
#   CC-BY-SA-4.0 — Creative Commons Attribution-ShareAlike 4.0
#   OGL-AU    — Australian Government Open Government Licence
#   PUBLIC-DOMAIN — Public domain or equivalent
#   REVIEW-NEEDED — Terms permit reading but reuse for training must be verified;
#                   content will be collected but flagged in the manifest.
#
# A page being publicly readable does NOT automatically make it suitable for model training.
# Before including flagged sources in a released training corpus, verify the licence
# or obtain permission.

